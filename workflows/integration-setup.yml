name: Integration Test Setup
description: >
  Sets up a two-node Mero Calendar environment for Playwright integration tests.
  Creates a shared calendar context, registers two members (Alice and Bob), seeds
  a shared event, then leaves the nodes running for Playwright to drive.

stop_all_nodes: false
restart: false
wait_timeout: 120

nodes:
  chain_id: testnet-1
  count: 2
  image: ghcr.io/calimero-network/merod:0.11.0-rc.6
  prefix: calimero-node

steps:
  - name: Install Application on Node 1
    type: install_application
    node: calimero-node-1
    path: "../logic/res/merocalendar.wasm"
    dev: true
    outputs:
      app_id: applicationId

  - name: Install Application on Node 2
    type: install_application
    node: calimero-node-2
    path: "../logic/res/merocalendar.wasm"
    dev: true

  - name: Create Namespace
    type: create_group
    node: calimero-node-1
    application_id: "{{app_id}}"
    outputs:
      namespace_id: namespaceId

  - name: Create Calendar Context
    type: create_context
    node: calimero-node-1
    application_id: "{{app_id}}"
    group_id: "{{namespace_id}}"
    params: '{}'
    outputs:
      context_id: contextId
      member_public_key: memberPublicKey

  - name: Create Identity on Node 2
    type: create_identity
    node: calimero-node-2
    outputs:
      public_key_2: publicKey

  - name: Wait for Identity Setup
    type: wait
    seconds: 3

  - name: Invite Node 2
    type: create_group_invitation
    node: calimero-node-1
    group_id: "{{namespace_id}}"
    outputs:
      invitation_2: invitation

  - name: Node 2 Joins Namespace
    type: join_group
    node: calimero-node-2
    group_id: "{{namespace_id}}"
    invitation: "{{invitation_2}}"

  - name: Node 2 Joins Calendar Context
    type: join_context
    node: calimero-node-2
    context_id: "{{context_id}}"

  - name: Wait for Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [calimero-node-1, calimero-node-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Alice Registers Username
    type: call
    node: calimero-node-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: set_username
    args:
      username: "Alice"
      timestamp: 1751953000

  - name: Bob Registers Username
    type: call
    node: calimero-node-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_2}}"
    method: set_username
    args:
      username: "Bob"
      timestamp: 1751953001

  - name: Alice Seeds a Shared Event
    type: call
    node: calimero-node-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: create_event
    args:
      event_data:
        title: "Integration Standup"
        description: "Seeded by integration-setup"
        start: "2026-07-01T09:00:00"
        end: "2026-07-01T09:30:00"
        event_type: "event"
        color: "rgb(51, 182, 121)"
        peers:
          - "{{public_key_2}}"
      timestamp: 1751953010

  - name: Final Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [calimero-node-1, calimero-node-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

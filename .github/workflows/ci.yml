name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        working-directory: app
        run: pnpm test
      - name: Type check
        working-directory: app
        run: pnpm exec tsc --noEmit
      - name: Lint
        working-directory: app
        run: pnpm lint

  e2e-tests:
    name: E2E Tests (Playwright, mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: app
        run: pnpm exec playwright install chromium --with-deps
      - name: Run mocked E2E tests
        working-directory: app
        run: pnpm exec playwright test --project=mocked
        env:
          CI: "true"
          PW_PORT: "5174"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/e2e-report/
          retention-days: 7

  rust:
    name: Rust (check + test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
          targets: wasm32-unknown-unknown
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            logic/target
          key: cargo-${{ runner.os }}-${{ hashFiles('logic/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: Rust unit tests (native)
        working-directory: logic
        run: cargo test
      - name: WASM type check
        working-directory: logic
        run: cargo check --target wasm32-unknown-unknown
